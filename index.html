<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Hamperverse</title>
</head>
<body>

    <div class="products">
        <div class="card-thumb">
            <img src="thumbnail1.jpg" alt="Product 1">
            <h2>Product Title 1</h2>
            <p>Product description goes here.</p>
        </div>
        <div class="card-thumb">
            <img src="thumbnail2.jpg" alt="Product 2">
            <h2>Product Title 2</h2>
            <p>Product description goes here.</p>
        </div>
        <div class="card-thumb">
            <img src="thumbnail3.jpg" alt="Product 3">
            <h2>Product Title 3</h2>
            <p>Product description goes here.</p>
        </div>
        <!-- More products -->
    </div>

</body>
</html>
<style>
    .card-thumb {
        aspect-ratio: 1 / 1;
        /* Keep all other styles the same */
    }

    @media (min-width: 768px) {
        .products {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
        }
    }

    @media (min-width: 480px) and (max-width: 767px) {
        .products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 479px) {
        .products {
            display: grid;
            grid-template-columns: 1fr;
        }
    }
</style>
